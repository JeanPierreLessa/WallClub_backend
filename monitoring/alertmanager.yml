global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "telegram"
  routes:
    - match:
        severity: critical
      receiver: "telegram-critical"
      repeat_interval: 30m

receivers:
  - name: "telegram"
    telegram_configs:
      - bot_token: "${TELEGRAM_MONITOR_BOT_TOKEN}"
        chat_id: ${TELEGRAM_MONITOR_BOT_CHAT_ID}
        send_resolved: true
        message: |
          [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
          Service: {{ .GroupLabels.service }}
          Status: {{ .Status }}

  - name: "telegram-critical"
    telegram_configs:
      - bot_token: "${TELEGRAM_MONITOR_BOT_TOKEN}"
        chat_id: ${TELEGRAM_MONITOR_BOT_CHAT_ID}
        send_resolved: true
        message: |
          🚨 CRÍTICO: {{ .GroupLabels.alertname }}
          Serviço: {{ .GroupLabels.service }}
          Status: {{ .Status }}
          {{ range .Alerts }}{{ .Annotations.description }}{{ end }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "service"]
