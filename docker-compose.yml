services:
  # Nginx - Gateway (única porta externa)
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx
    ports:
      - "8005:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/django/staticfiles:/staticfiles:ro
      - ./services/django/media:/media:ro
    depends_on:
      - wallclub-portais
      - wallclub-pos
      - wallclub-apis
      - wallclub-riskengine
    restart: unless-stopped
    networks:
      - wallclub-network

  # Redis - Cache e Broker do Celery
  redis:
    image: redis:7-alpine
    container_name: wallclub-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.5
    networks:
      - wallclub-network

  # Container 1: Portais (Admin + Vendas + Lojista)
  wallclub-portais:
    build:
      context: .
      dockerfile: Dockerfile.portais
    container_name: wallclub-portais
    expose:
      - "8005"
    env_file:
      - ./services/django/.env
    environment:
      - DJANGO_SETTINGS_MODULE=wallclub.settings.portais
      - REDIS_HOST=wallclub-redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://wallclub-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://wallclub-redis:6379/0
    volumes:
      - ./services/django/logs:/app/logs
      - ./services/django/media:/app/media
      - ./services/django/staticfiles:/app/staticfiles
      - ./services/core:/app/services/core:ro
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    networks:
      - wallclub-network

  # Container 2: POS (Terminal POS)
  wallclub-pos:
    build:
      context: .
      dockerfile: Dockerfile.pos
    container_name: wallclub-pos
    expose:
      - "8006"
    env_file:
      - ./services/django/.env
    environment:
      - DJANGO_SETTINGS_MODULE=wallclub.settings.pos
      - REDIS_HOST=wallclub-redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://wallclub-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://wallclub-redis:6379/0
      - RISK_ENGINE_URL=http://wallclub-riskengine:8008
    volumes:
      - ./services/django/logs:/app/logs
      - ./services/core:/app/services/core:ro
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - wallclub-network

  # Container 3: APIs (Mobile + Checkout)
  wallclub-apis:
    build:
      context: .
      dockerfile: Dockerfile.apis
    container_name: wallclub-apis
    expose:
      - "8007"
    env_file:
      - ./services/django/.env
    environment:
      - DJANGO_SETTINGS_MODULE=wallclub.settings.apis
      - REDIS_HOST=wallclub-redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://wallclub-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://wallclub-redis:6379/0
      - RISK_ENGINE_URL=http://wallclub-riskengine:8008
    volumes:
      - ./services/django/logs:/app/logs
      - ./services/django/media:/app/media
      - ./services/core:/app/services/core:ro
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    networks:
      - wallclub-network

  # Container 4: Risk Engine (Antifraude)
  wallclub-riskengine:
    build:
      context: .
      dockerfile: Dockerfile.riskengine
    container_name: wallclub-riskengine
    command: gunicorn riskengine.wsgi:application --bind 0.0.0.0:8008 --workers 3 --timeout 120 --log-level=info --access-logfile=- --error-logfile=-
    expose:
      - "8008"
    env_file:
      - ./services/riskengine/.env
    environment:
      - REDIS_HOST=wallclub-redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://wallclub-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://wallclub-redis:6379/0
      - CALLBACK_URL_PRINCIPAL=http://wallclub-apis:8007
    volumes:
      - ./services/riskengine/logs:/app/logs
      - ./services/core:/app/services/core:ro
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - wallclub-network

  # Celery Worker - Unificado (acesso a todos os apps)
  wallclub-celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.portais
    container_name: wallclub-celery-worker
    command: celery -A wallclub worker --loglevel=info --concurrency=3 -E --max-tasks-per-child=100
    env_file:
      - ./services/django/.env
    environment:
      - DJANGO_SETTINGS_MODULE=wallclub.settings.celery_worker
      - REDIS_HOST=wallclub-redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://wallclub-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://wallclub-redis:6379/0
    volumes:
      - ./services/django/logs:/app/logs
      - ./services/core:/app/services/core:ro
    depends_on:
      - redis
      - wallclub-portais
      - wallclub-apis
      - wallclub-pos
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - wallclub-network

  # Celery Beat - Scheduler
  wallclub-celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.portais
    container_name: wallclub-celery-beat
    command: celery -A wallclub beat --loglevel=info
    env_file:
      - ./services/django/.env
    environment:
      - DJANGO_SETTINGS_MODULE=wallclub.settings.celery_worker
      - REDIS_HOST=wallclub-redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://wallclub-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://wallclub-redis:6379/0
    volumes:
      - ./services/django/logs:/app/logs
      - ./services/core:/app/services/core:ro
    depends_on:
      - redis
      - wallclub-celery-worker
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    networks:
      - wallclub-network

  # Flower - Monitoramento Celery
  flower:
    build:
      context: .
      dockerfile: Dockerfile.flower
    container_name: wallclub-flower
    expose:
      - "5555"
    environment:
      - CELERY_BROKER_URL=redis://wallclub-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://wallclub-redis:6379/0
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      - redis
      - wallclub-celery-worker
      - wallclub-celery-beat
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    networks:
      - wallclub-network

  # Prometheus - Monitoramento
  prometheus:
    image: prom/prometheus:latest
    container_name: wallclub-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    expose:
      - "9090"
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - wallclub-network

  # Alertmanager - Alert Notifications
  alertmanager:
    image: prom/alertmanager:latest
    container_name: wallclub-alertmanager
    volumes:
      - alertmanager-data:/alertmanager
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./monitoring/alertmanager-entrypoint.sh:/entrypoint.sh:ro
    env_file:
      - ./services/django/.env
    entrypoint: /entrypoint.sh
    command: []
    expose:
      - "9093"
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    networks:
      - wallclub-network

  # Grafana - Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: wallclub-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
    env_file:
      - ./services/django/.env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWD:-wallclub2026}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    expose:
      - "3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    networks:
      - wallclub-network

  # Redis Exporter - Métricas do Redis
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: wallclub-redis-exporter
    command:
      - '--redis.addr=redis://wallclub-redis:6379'
    expose:
      - "9121"
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.1
    networks:
      - wallclub-network

  # Node Exporter - Métricas do Sistema
  node-exporter:
    image: prom/node-exporter:latest
    container_name: wallclub-node-exporter
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - '/:/host:ro'
    expose:
      - "9100"
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.1
    networks:
      - wallclub-network

networks:
  wallclub-network:
    driver: bridge
    name: wallclub-network

volumes:
  redis_data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
