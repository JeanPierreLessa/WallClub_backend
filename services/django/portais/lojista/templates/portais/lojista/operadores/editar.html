{% extends 'portais/lojista/base.html' %}
{% load static %}

{% block title %}Editar Operador - Portal Lojista{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-3">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">
                        <i class="fas fa-user-edit me-2"></i>
                        Editar Operador: {{ operador.operador }}
                    </h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Código do Operador</label>
                                <input type="text" class="form-control" value="{{ operador.operador }}" disabled>
                                <small class="text-muted">Código não pode ser alterado</small>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label">CPF</label>
                                <input type="text" class="form-control" value="{{ operador.cpf }}" disabled>
                                <small class="text-muted">CPF não pode ser alterado</small>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label for="nome" class="form-label">Nome Completo *</label>
                                <input type="text" name="nome" id="nome" class="form-control" maxlength="150" value="{{ operador.nome }}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="identificacao_loja" class="form-label">Identificação na Loja</label>
                                <input type="text" name="identificacao_loja" id="identificacao_loja" class="form-control" maxlength="50" value="{{ operador.identificacao_loja|default:'' }}">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="matricula" class="form-label">Matrícula</label>
                                <input type="text" name="matricula" id="matricula" class="form-control" maxlength="50" value="{{ operador.matricula|default:'' }}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="telefone" class="form-label">Telefone</label>
                                <input type="text" name="telefone" id="telefone" class="form-control" maxlength="20" value="{{ operador.telefone|default:'' }}">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" name="email" id="email" class="form-control" maxlength="256" value="{{ operador.email|default:'' }}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-12 mb-3">
                                <label for="endereco_loja" class="form-label">Endereço da Loja</label>
                                <input type="text" name="endereco_loja" id="endereco_loja" class="form-control" maxlength="255" value="{{ operador.endereco_loja|default:'' }}">
                            </div>
                        </div>

                        <div class="row mt-4">
                            <div class="col-12">
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save me-2"></i>Salvar Alterações
                                </button>
                                <a href="{% url 'lojista:listar_operadores' %}" class="btn btn-secondary">
                                    <i class="fas fa-times me-2"></i>Cancelar
                                </a>
                                <a href="{% url 'lojista:visualizar_operador' operador.id %}" class="btn btn-info">
                                    <i class="fas fa-eye me-2"></i>Visualizar
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
